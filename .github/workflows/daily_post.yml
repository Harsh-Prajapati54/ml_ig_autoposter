name: Daily ML/AI Instagram Post

on:
  schedule:
    #14:30 UTC = 8:00 PM IST. Edit to taste (cron is UTC).
    - cron: "30 14 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so GITHUB_TOKEN can commit images/state via the API

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Generate and publish post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          # "drive" for now; switch this repo variable to "instagram" once
          # your IG Business account + Graph API token are set up — no code
          # changes needed.
          PUBLISH_MODE: ${{ vars.PUBLISH_MODE }}
          IG_HANDLE: ${{ vars.IG_HANDLE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_BRANCH: main
        run: python main.py
